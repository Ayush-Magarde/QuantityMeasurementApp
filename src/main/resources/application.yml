spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
app:
  oauth:
    frontend-callback-url: ${FRONTEND_OAUTH_CALLBACK_URL:http://localhost:4200/oauth2/callback}
